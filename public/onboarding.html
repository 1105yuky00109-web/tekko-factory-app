<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>新規ご契約・アカウント登録</title>
  <script src="https://js.stripe.com/v3/" defer></script>
  <script src="onboarding.js?v=20260616_v1" defer></script>
  <style>
    :root {
      --primary: #2563eb;
      --primary-hover: #1d4ed8;
      --background: #f8fafc;
      --card-bg: #ffffff;
      --text: #0f172a;
      --text-muted: #64748b;
      --border: #e2e8f0;
      --border-focus: #3b82f6;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: linear-gradient(135deg, #f1f5f9 0%, #e2e8f0 100%);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .onboarding-card {
      background: var(--card-bg);
      border-radius: 16px;
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
      border: 1px solid var(--border);
      width: 100%;
      max-width: 580px;
      padding: 40px;
      transition: all 0.3s ease;
    }

    @media (max-width: 600px) {
      body {
        padding: 10px;
      }
      .onboarding-card {
        padding: 24px;
        border-radius: 12px;
      }
    }

    .header {
      text-align: center;
      margin-bottom: 32px;
    }

    .header h1 {
      font-size: 1.8rem;
      font-weight: 800;
      background: linear-gradient(135deg, #4f46e5, #2563eb);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 8px;
    }

    .header p {
      font-size: 0.9rem;
      color: var(--text-muted);
    }

    .form-group {
      margin-bottom: 24px;
    }

    .form-group label.field-label {
      display: block;
      font-size: 0.85rem;
      font-weight: 700;
      color: #334155;
      margin-bottom: 8px;
    }

    .input-text {
      width: 100%;
      padding: 12px 16px;
      font-size: 0.95rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: #f8fafc;
      color: var(--text);
      outline: none;
      transition: all 0.2s ease;
    }

    .input-text:focus {
      background: #fff;
      border-color: var(--border-focus);
      box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.15);
    }

    .input-desc {
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-top: 4px;
      line-height: 1.4;
    }

    /* プランカードスタイル */
    .plan-options {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 8px;
    }

    .plan-option-label {
      display: block;
      position: relative;
      cursor: pointer;
    }

    .plan-option-label input[type="radio"] {
      position: absolute;
      opacity: 0;
      width: 0;
      height: 0;
    }

    .plan-option-body {
      background: #ffffff;
      border: 2px solid var(--border);
      border-radius: 10px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      transition: all 0.2s ease;
      text-align: left;
    }

    .plan-option-label input[type="radio"]:checked + .plan-option-body {
      background: #f0f9ff;
      border-color: var(--primary);
    }

    .plan-option-label:hover .plan-option-body {
      transform: translateY(-1px);
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
      border-color: #cbd5e1;
    }

    .plan-option-label input[type="radio"]:checked:hover .plan-option-body {
      border-color: var(--primary);
    }

    .option-title {
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--text);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .option-price {
      color: var(--primary);
      font-weight: 800;
    }

    .option-desc {
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-top: 4px;
    }

    /* パスワード入力エリア */
    .password-wrapper {
      position: relative;
      display: flex;
      align-items: center;
      width: 100%;
    }

    .password-wrapper input {
      padding-right: 45px;
    }

    /* Edge/IE等のブラウザ標準のパスワード表示・非表示ボタンを非表示にする */
    .password-wrapper input::-ms-reveal,
    .password-wrapper input::-ms-clear {
      display: none;
    }

    .toggle-password-btn {
      position: absolute;
      right: 12px;
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-muted);
      font-size: 1.1rem;
      outline: none;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 4px;
      transition: color 0.2s ease;
    }

    .toggle-password-btn:hover {
      color: var(--text);
    }

    /* ボタン */
    .primary-btn {
      display: block;
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-hover) 100%);
      color: #ffffff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 4px 6px -1px rgba(37, 99, 235, 0.15), 0 2px 4px -1px rgba(37, 99, 235, 0.1);
      transition: all 0.2s ease;
      margin-top: 32px;
    }

    .primary-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.2), 0 4px 6px -2px rgba(37, 99, 235, 0.15);
    }

    .primary-btn:active {
      transform: translateY(1px);
    }

    .message {
      margin-top: 16px;
      padding: 12px;
      border-radius: 8px;
      font-size: 0.9rem;
      text-align: center;
      display: none;
    }

    .message.error {
      background: #fef2f2;
      color: #991b1b;
      border: 1px solid #fee2e2;
      display: block;
    }
    .spinner-icon {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2.5px solid rgba(255, 255, 255, 0.3);
      border-radius: 50%;
      border-top-color: #fff;
      animation: spin 0.8s linear infinite;
      margin-right: 8px;
      vertical-align: middle;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <main class="onboarding-card">
    <div class="header">
      <h1>新規ご契約・アカウント登録</h1>
      <p>ご契約後、即時アカウントが発行され利用可能になります。</p>
    </div>

    <form id="onboarding-form">
      <div class="form-group">
        <label for="companyName" class="field-label">会社名</label>
        <input type="text" id="companyName" name="companyName" class="input-text" placeholder="例: 株式会社大和田建設" required />
      </div>



      <div class="form-group">
        <label class="field-label">ご契約プラン（上限人数） <span style="color:red">*</span></label>
        <input type="hidden" id="onboarding-plan-id" name="plan" value="free" />
        <div class="plan-options">
          <label class="plan-option-label">
            <input type="radio" name="quantity" value="free" checked />
            <div class="plan-option-body">
              <div class="option-title">
                <span>🎁 無料プラン (人数無制限)</span>
                <span class="option-price">¥0/永年無料</span>
              </div>
              <div class="option-desc">クレジットカードや銀行口座の登録なしで、登録人数無制限で無料でご利用いただけます。</div>
            </div>
          </label>
          <label class="plan-option-label">
            <input type="radio" name="quantity" value="1" />
            <div class="plan-option-body">
              <div class="option-title">
                <span>10名プラン (合計 10名まで)</span>
                <span class="option-price">¥5,000/月<span style="font-size:0.75rem;color:var(--text-muted); font-weight:normal;"> (税別)</span></span>
              </div>
              <div class="option-desc">最大10名までのユーザーが利用可能です。</div>
            </div>
          </label>
          <label class="plan-option-label">
            <input type="radio" name="quantity" value="2" />
            <div class="plan-option-body">
              <div class="option-title">
                <span>20名プラン (合計 20名まで)</span>
                <span class="option-price">¥10,000/月<span style="font-size:0.75rem;color:var(--text-muted); font-weight:normal;"> (税別)</span></span>
              </div>
              <div class="option-desc">最大20名までのユーザーが利用可能です。</div>
            </div>
          </label>
          <label class="plan-option-label">
            <input type="radio" name="quantity" value="3" />
            <div class="plan-option-body">
              <div class="option-title">
                <span>30名プラン (合計 30名まで)</span>
                <span class="option-price">¥15,000/月<span style="font-size:0.75rem;color:var(--text-muted); font-weight:normal;"> (税別)</span></span>
              </div>
              <div class="option-desc">最大30名までのユーザーが利用可能です。</div>
            </div>
          </label>
          <label class="plan-option-label">
            <input type="radio" name="quantity" value="4" />
            <div class="plan-option-body">
              <div class="option-title">
                <span>40名プラン (合計 40名まで)</span>
                <span class="option-price">¥20,000/月<span style="font-size:0.75rem;color:var(--text-muted); font-weight:normal;"> (税別)</span></span>
              </div>
              <div class="option-desc">最大40名までのユーザーが利用可能です。</div>
            </div>
          </label>
          <label class="plan-option-label">
            <input type="radio" name="quantity" value="5" />
            <div class="plan-option-body">
              <div class="option-title">
                <span>50名プラン (合計 50名まで)</span>
                <span class="option-price">¥25,000/月<span style="font-size:0.75rem;color:var(--text-muted); font-weight:normal;"> (税別)</span></span>
              </div>
              <div class="option-desc">最大50名までのユーザーが利用可能です。</div>
            </div>
          </label>
        </div>
      </div>

      <div class="form-group" id="payment-method-section" style="display: none;">
        <label class="field-label">お支払い方法 <span style="color:red">*</span></label>
        <div style="display: flex; flex-direction: column; gap: 12px; margin-top: 8px; background: #f8fafc; padding: 14px; border-radius: 8px; border: 1px solid var(--border);">
          <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
            <input type="radio" name="paymentMethod" value="card" checked style="width: 18px; height: 18px;" />
            <span style="font-size: 0.95rem; font-weight: 600; color: var(--text);">クレジットカード決済</span>
          </label>
          <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
            <input type="radio" name="paymentMethod" value="invoice" style="width: 18px; height: 18px;" />
            <span style="font-size: 0.95rem; font-weight: 600; color: var(--text);">請求書払い（銀行振込・後日Stripeから自動で請求書がメールで届きます）</span>
          </label>
        </div>
      </div>
      <div id="payment-method-free-note" style="display: block; background: #ecfdf5; border: 1px solid #a7f3d0; padding: 14px; border-radius: 8px; font-size: 0.9rem; color: #065f46; margin-bottom: 24px; font-weight: bold;">
        ✅ 無料プランのため、お支払い方法の登録は不要です。
      </div>

      <div class="form-group">
        <label for="adminName" class="field-label">管理者氏名</label>
        <input type="text" id="adminName" name="adminName" class="input-text" placeholder="例: 大和田 太郎" required />
      </div>

      <div class="form-group">
        <label for="adminEmail" class="field-label">管理者メールアドレス</label>
        <input type="email" id="adminEmail" name="adminEmail" class="input-text" placeholder="name@company.com" required />
      </div>

      <div class="form-group">
        <label for="password" class="field-label">管理者ログイン用パスワード（半角英数字6文字以上） <span style="color:red">*</span></label>
        <p class="input-desc" style="margin-bottom: 6px;">
            ※本システムにログインするための専用のパスワードです（Googleやメールアドレス自体のパスワードではありません）。ご自身で任意のパスワードを決めて入力してください。
        </p>
        <div class="password-wrapper">
          <input type="password" id="password" name="password" class="input-text" required minlength="6" pattern="[a-zA-Z0-9]+" title="半角英数字6文字以上で入力してください。" />
          <button type="button" class="toggle-password-btn" data-target="password" style="display: flex; align-items: center; justify-content: center;">
            <svg class="eye-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" style="width: 20px; height: 20px;">
              <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 0 1 0-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178Z" />
              <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
            </svg>
          </button>
        </div>
      </div>

      <div class="form-group">
        <label for="password-confirm" class="field-label">管理者ログイン用パスワード（確認） <span style="color:red">*</span></label>
        <div class="password-wrapper">
          <input type="password" id="password-confirm" name="passwordConfirm" class="input-text" required minlength="6" pattern="[a-zA-Z0-9]+" title="半角英数字6文字以上で入力してください。" />
          <button type="button" class="toggle-password-btn" data-target="password-confirm" style="display: flex; align-items: center; justify-content: center;">
            <svg class="eye-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" style="width: 20px; height: 20px;">
              <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 0 1 0-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178Z" />
              <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
            </svg>
          </button>
        </div>
      </div>

      <button type="submit" id="submit-btn" class="primary-btn">支払いに進む</button>
    </form>
    <div id="message" class="message"></div>
  </main>

  <!-- 新規登録時に既存のログインセッションを強制的にログアウト（クリア）する -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = {
    apiKey: "AIzaSyATXg0kIf7_iYDcRslbH-C0zyCC_dtFmI4",
    authDomain: "tekko-factory-app.firebaseapp.com",
    projectId: "tekko-factory-app",
    storageBucket: "tekko-factory-app.firebasestorage.app",
    messagingSenderId: "354843914657",
    appId: "1:354843914657:web:fbed32a7bae1c74af35be0"
};

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    onAuthStateChanged(auth, async (user) => {
        if (user) {
            const isDeveloper = user && (
                (user.email && user.email.toLowerCase().trim() === 'steelworks@areva.co.jp') ||
                (user.uid === 'uQ2CTFIUMha6kxbXOWrpnIDjeRq2')
            );
            if (isDeveloper) {
                console.log("onboarding: Developer account detected. Skipping force logout.");
                return;
            }
            console.log("onboarding: logged-in user detected, logging out to prevent session mismatch:", user.email);
            try {
                await signOut(auth);
                console.log("onboarding: successfully logged out.");
            } catch (e) {
                console.error("onboarding: logout failed:", e);
            }
        }
    });
  </script>
</body>
</html>
