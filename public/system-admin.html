<!DOCTYPE html>
<html lang="ja">
<head>
  <script>
    // 開発者専用画面では、Service Worker による意図しないキャッシュや裏でのログアウト干渉を防ぐため、
    // 起動時に登録されているすべての Service Worker を強制的に解除し、キャッシュをクリアします。
    (function() {
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(registrations) {
          for (var i = 0; i < registrations.length; i++) {
            registrations[i].unregister().then(function(success) {
              if (success) console.log('Successfully unregistered service worker for admin panel.');
            });
          }
        });
      }
      if ('caches' in window) {
        caches.keys().then(function(keys) {
          keys.forEach(function(key) {
            caches.delete(key);
          });
        });
      }
    })();
  </script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>開発者専用 システム管理パネル</title>
  <style>
    :root {
      --primary: #6366f1;
      --primary-hover: #4f46e5;
      --background: #0f172a;
      --card-bg: #1e293b;
      --text: #f8fafc;
      --text-muted: #94a3b8;
      --border: #334155;
      --success: #10b981;
      --warning: #f59e0b;
      --error: #ef4444;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background-color: var(--background);
      color: var(--text);
      min-height: 100vh;
      padding: 20px;
    }

    .hidden {
      display: none !important;
    }

    /* ログイン画面 */
    .login-wrapper {
      min-height: 90vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 30px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
    }

    .login-card h2 {
      font-size: 1.4rem;
      margin-bottom: 10px;
      text-align: center;
      color: var(--primary);
    }

    .login-card p {
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-bottom: 20px;
      text-align: center;
    }

    .form-group {
      margin-bottom: 15px;
    }

    .form-group label {
      display: block;
      font-size: 0.8rem;
      margin-bottom: 5px;
      color: var(--text-muted);
    }

    .input-text {
      width: 100%;
      padding: 10px 12px;
      background: #0f172a;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      outline: none;
      font-size: 0.9rem;
    }

    .input-text:focus {
      border-color: var(--primary);
    }

    .btn {
      display: inline-block;
      padding: 10px 16px;
      font-size: 0.9rem;
      font-weight: bold;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      text-align: center;
      transition: background 0.2s;
    }

    .btn-primary {
      background: var(--primary);
      color: #fff;
      width: 100%;
    }

    .btn-primary:hover {
      background: var(--primary-hover);
    }

    .message {
      margin-top: 15px;
      padding: 10px;
      border-radius: 6px;
      font-size: 0.85rem;
      text-align: center;
    }

    .message.error {
      background: rgba(239, 68, 68, 0.15);
      color: var(--error);
      border: 1px solid rgba(239, 68, 68, 0.3);
    }

    /* 管理ダッシュボード */
    .dashboard-container {
      max-width: 1200px;
      margin: 0 auto;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border);
      padding-bottom: 15px;
      margin-bottom: 25px;
    }

    header h1 {
      font-size: 1.5rem;
      color: var(--primary);
    }

    .user-info {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .btn-secondary {
      background: #334155;
      color: var(--text);
      font-size: 0.8rem;
      padding: 6px 12px;
    }

    .btn-secondary:hover {
      background: #475569;
    }

    .control-panel {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 25px;
    }

    .control-title {
      font-size: 1.1rem;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .control-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 15px;
    }

    select.btn-select {
      background: #1e3a8a;
      color: #fff;
      border: 1px solid #3b82f6;
      border-radius: 6px;
      padding: 10px;
      outline: none;
      cursor: pointer;
    }

    /* 会社サマリーカード */
    .company-cards {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 15px;
      margin-bottom: 25px;
    }

    .company-card {
      border-radius: 12px;
      padding: 20px;
      color: #fff;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .company-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.4);
    }

    /* データテーブル */
    .data-table-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      margin-bottom: 25px;
    }

    .table-header {
      padding: 15px 20px;
      background: rgba(255, 255, 255, 0.03);
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .table-header h3 {
      font-size: 1rem;
      margin: 0;
    }

    .table-container {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
      text-align: left;
    }

    th {
      background: rgba(0, 0, 0, 0.2);
      padding: 12px 15px;
      color: var(--text-muted);
      font-weight: bold;
      border-bottom: 1px solid var(--border);
    }

    td {
      padding: 12px 15px;
      border-bottom: 1px solid var(--border);
    }

    tr:hover {
      background: rgba(255, 255, 255, 0.02);
    }

    .badge-company {
      background: #1e3a8a;
      color: #93c5fd;
      padding: 3px 8px;
      border-radius: 6px;
      font-size: 0.8rem;
      font-weight: bold;
      font-family: monospace;
    }

    .badge-status {
      padding: 2px 8px;
      border-radius: 20px;
      font-size: 0.8rem;
    }

    .badge-status.approved {
      background: rgba(16, 185, 129, 0.15);
      color: var(--success);
      border: 1px solid rgba(16, 185, 129, 0.3);
    }

    .badge-status.confirmed {
      background: rgba(59, 130, 246, 0.15);
      color: #60a5fa;
      border: 1px solid rgba(59, 130, 246, 0.3);
    }

    .badge-status.plan {
      background: rgba(245, 158, 11, 0.15);
      color: var(--warning);
      border: 1px solid rgba(245, 158, 11, 0.3);
    }

    .btn-tab {
      background: #334155;
      color: var(--text-muted);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 10px 20px;
      cursor: pointer;
      font-weight: bold;
      transition: background 0.2s, color 0.2s;
    }

    .btn-tab:hover {
      background: #475569;
      color: var(--text);
    }

    .btn-tab.active {
      background: var(--primary) !important;
      color: #fff !important;
      border-color: var(--primary) !important;
    }

    .tab-content {
      display: block;
    }

    .tab-content.hidden {
      display: none !important;
    }

    /* 企業一覧用バッジ */
    .badge-trial {
      background: rgba(239, 68, 68, 0.15);
      color: var(--error);
      border: 1px solid rgba(239, 68, 68, 0.3);
      padding: 2px 8px;
      border-radius: 20px;
      font-size: 0.8rem;
    }

    .badge-active {
      background: rgba(16, 185, 129, 0.15);
      color: var(--success);
      border: 1px solid rgba(16, 185, 129, 0.3);
      padding: 2px 8px;
      border-radius: 20px;
      font-size: 0.8rem;
    }

    /* 詳細ポップアップモーダルスタイル */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: rgba(15, 23, 42, 0.65);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10000;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease;
    }

    .modal-overlay.show {
      opacity: 1;
      pointer-events: auto;
    }

    .modal-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 16px;
      width: 95%;
      max-width: 1000px;
      max-height: 90vh;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      display: flex;
      flex-direction: column;
      transform: scale(0.95);
      transition: transform 0.25s cubic-bezier(0.16, 1, 0.3, 1);
      overflow: hidden;
    }

    .modal-overlay.show .modal-card {
      transform: scale(1);
    }

    .modal-header {
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(255, 255, 255, 0.01);
    }

    .modal-header h2 {
      font-size: 1.25rem;
      color: var(--primary);
    }

    .btn-close {
      background: none;
      border: none;
      font-size: 2rem;
      color: var(--text-muted);
      cursor: pointer;
      line-height: 1;
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      transition: background 0.2s, color 0.2s, transform 0.2s;
    }

    .btn-close:hover {
      background: rgba(239, 68, 68, 0.1);
      color: var(--error);
      transform: rotate(90deg);
    }

    .modal-body {
      padding: 24px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    @media (min-width: 768px) {
      .modal-body {
        display: grid;
        grid-template-columns: 1.3fr 1fr;
        align-items: start;
        height: 60vh;
      }
    }

    .chart-wrapper {
      background: rgba(15, 23, 42, 0.4);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      height: 100%;
      min-height: 300px;
      box-sizing: border-box;
    }
    
    .chart-wrapper canvas {
      max-width: 100% !important;
      max-height: 100% !important;
    }

    .modal-table-wrapper {
      border: 1px solid var(--border);
      border-radius: 12px;
      background: rgba(15, 23, 42, 0.2);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      height: 100%;
    }
  </style>
  <!-- Chart.js CDN -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <!-- 1. ログイン画面 -->
  <div id="login-container" class="login-wrapper">
    <div class="login-card">
      <h2>システム管理 ログイン</h2>
      <p>※開発元専用の管理パネルです。</p>
      <form id="login-form">
        <div class="form-group">
          <label for="login-email">メールアドレス</label>
          <input type="email" id="login-email" required class="input-text" placeholder="name@example.com" />
        </div>
        <div class="form-group">
          <label for="login-password">パスワード</label>
          <input type="password" id="login-password" required class="input-text" />
        </div>
        <button type="submit" class="btn btn-primary">管理者ログイン</button>
        <div id="login-error" class="message error hidden"></div>
      </form>
    </div>
  </div>

  <!-- 2. ダッシュボード画面（ログイン後） -->
  <div id="app-container" class="dashboard-container hidden">
    <header>
      <h1>🔧 開発元 システム管理ダッシュボード</h1>
      <div class="user-info">
        <span id="current-user-email" style="font-weight: bold; color: var(--primary);"></span>
        <button id="btn-logout" class="btn btn-secondary">ログアウト</button>
      </div>
    </header>

    <!-- コントロールパネル -->
    <section class="control-panel" style="margin-bottom: 20px;">
      <div class="control-actions" style="margin-top: 0; display: flex; gap: 10px; align-items: center;">
        <button id="admin-reload-btn" class="btn" style="background:#4f46e5; color:#fff;">🔄 本番データ再読み込み</button>
        <select id="admin-company-filter" class="btn-select" style="padding: 10px; font-size: 0.9rem; background: #1e3a8a; color: #fff; border: 1px solid #3b82f6; border-radius: 6px; cursor: pointer;">
          <option value="">🏢 会社を選択して絞り込み...</option>
        </select>
      </div>
    </section>

    <!-- 企業一覧セクション -->
    <div id="companies-section" class="tab-content">
      <!-- 全体サマリーカード -->
      <div class="company-cards" style="grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); margin-bottom: 25px;">
        <div class="company-card" style="background: linear-gradient(135deg, #3b82f6, #1d4ed8); pointer-events: none;">
          <div style="font-size: 1.5rem; margin-bottom: 5px;">🏢</div>
          <div style="font-size: 0.8rem; opacity: 0.8;">登録総企業数</div>
          <div id="summary-total-companies" style="font-size: 2rem; font-weight: bold; margin-top: 5px;">0 社</div>
        </div>
        <div class="company-card" style="background: linear-gradient(135deg, #10b981, #047857); pointer-events: none;">
          <div style="font-size: 1.5rem; margin-bottom: 5px;">👥</div>
          <div style="font-size: 0.8rem; opacity: 0.8;">総登録社員数</div>
          <div id="summary-total-employees" style="font-size: 2rem; font-weight: bold; margin-top: 5px;">0 名</div>
        </div>
        <div class="company-card" style="background: linear-gradient(135deg, #f59e0b, #b45309); pointer-events: none;">
          <div style="font-size: 1.5rem; margin-bottom: 5px;">🏗️</div>
          <div style="font-size: 0.8rem; opacity: 0.8;">総工事登録数</div>
          <div id="summary-total-schedules" style="font-size: 2rem; font-weight: bold; margin-top: 5px;">0 件</div>
        </div>
      </div>

      <!-- 企業別利用状況一覧テーブル -->
      <div class="data-table-card">
        <div class="table-header">
          <h3>企業別 利用状況一覧</h3>
          <span id="admin-companies-count" style="font-size:0.85rem; color:var(--text-muted);">0社</span>
        </div>
        <div class="table-container">
          <table>
            <thead>
              <tr>
                <th>🏢 会社ID / 企業名</th>
                <th>💳 契約プラン / 上限</th>
                <th>💰 支払い方法</th>
                <th style="text-align:center;">👤 社員数</th>
                <th style="text-align:center;">🏗️ 工事数</th>
                <th>状態 / トライアル期限</th>
                <th>✉️ 管理者メール</th>
                <th>📅 登録日</th>
              </tr>
            </thead>
            <tbody id="admin-companies-tbody">
              <tr>
                <td colspan="8" style="padding:30px; text-align:center; color:var(--text-muted);">
                  「本番データ再読み込み」ボタンを押すと読み込まれます。
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>

  <!-- 3. 会社詳細集計モーダル (ポップアップ別画面) -->
  <div id="company-detail-modal" class="modal-overlay">
    <div class="modal-card">
      <header class="modal-header">
        <h2 id="modal-company-title">🏢 会社詳細集計</h2>
        <button id="btn-close-modal" class="btn-close">&times;</button>
      </header>
      <div class="modal-body">
        <!-- グラフエリア -->
        <div class="chart-wrapper">
          <canvas id="company-report-chart"></canvas>
        </div>
        
        <!-- テーブルエリア -->
        <div class="modal-table-wrapper">
          <div class="table-header" style="padding: 12px 15px; background: rgba(255, 255, 255, 0.02); display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border);">
            <h3 style="font-size: 0.95rem;">工事別・月別稼働時間</h3>
            <div>
              <label for="admin-month-filter" style="font-size: 0.8rem; color: var(--text-muted); margin-right: 5px;">対象月:</label>
              <select id="admin-month-filter" class="btn-select" style="padding: 4px 8px; font-size: 0.8rem; background: var(--background); border-color: var(--border); color: #fff; cursor: pointer;">
                <option value="">すべての月</option>
              </select>
            </div>
          </div>
          <div class="table-container" style="overflow-y: auto; flex: 1;">
            <table>
              <thead>
                <tr style="background: rgba(0, 0, 0, 0.2);">
                  <th style="padding: 10px 15px; font-weight: bold; color: var(--text-muted);">🏗️ 工事名</th>
                  <th style="padding: 10px 15px; font-weight: bold; color: var(--text-muted);">📅 対象月</th>
                  <th style="padding: 10px 15px; text-align: right; width: 100px; font-weight: bold; color: var(--text-muted);">🕒 合計時間</th>
                </tr>
              </thead>
              <tbody id="admin-reports-tbody">
                <tr>
                  <td colspan="3" style="padding:30px; text-align:center; color:var(--text-muted);">
                    データをロード中...
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- system-admin.jsを読み込む -->
  <script type="module" src="system-admin.js?v=20260606-003"></script>
</body>
</html>
