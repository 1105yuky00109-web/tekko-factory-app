<!DOCTYPE html>
<html lang="ja">
<head>
  <script>
    // 開発者専用画面がPWA（インストールしたアプリ版）のウィンドウ内で開かれるのを防ぎます。
    if (window.matchMedia('(display-mode: standalone)').matches) {
      window.location.replace('app.html');
    }

    // 開発者専用画面では、Service Worker による意図しないキャッシュや裏でのログアウト干渉を防ぐため、
    // 起動時に登録されているすべての Service Worker を強制的に解除し、キャッシュをクリアします。
    (function() {
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(registrations) {
          for (var i = 0; i < registrations.length; i++) {
            registrations[i].unregister().then(function(success) {
              if (success) console.log('Successfully unregistered service worker for admin panel.');
            });
          }
        });
      }
      if ('caches' in window) {
        caches.keys().then(function(keys) {
          keys.forEach(function(key) {
            caches.delete(key);
          });
        });
      }
    })();
  </script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>開発者専用 システム管理パネル</title>
  <style>
    :root {
      --primary: #4f46e5;
      --primary-hover: #3730a3;
      --background: #f8fafc;
      --card-bg: #ffffff;
      --text: #0f172a;
      --text-muted: #64748b;
      --border: #e2e8f0;
      --success: #10b981;
      --warning: #f59e0b;
      --error: #ef4444;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background-color: var(--background);
      color: var(--text);
      min-height: 100vh;
      padding: 20px;
    }

    .hidden {
      display: none !important;
    }

    /* ログイン画面 */
    .login-wrapper {
      min-height: 90vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 30px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
    }

    .login-card h2 {
      font-size: 1.4rem;
      margin-bottom: 10px;
      text-align: center;
      color: var(--primary);
    }

    .login-card p {
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-bottom: 20px;
      text-align: center;
    }

    .form-group {
      margin-bottom: 15px;
    }

    .form-group label {
      display: block;
      font-size: 0.8rem;
      margin-bottom: 5px;
      color: var(--text-muted);
    }

    .input-text {
      width: 100%;
      padding: 10px 12px;
      background: #ffffff;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      outline: none;
      font-size: 0.9rem;
    }

    .input-text:focus {
      border-color: var(--primary);
    }

    .btn {
      display: inline-block;
      padding: 10px 16px;
      font-size: 0.9rem;
      font-weight: bold;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      text-align: center;
      transition: background 0.2s;
    }

    .btn-primary {
      background: var(--primary);
      color: #fff;
      width: 100%;
    }

    .btn-primary:hover {
      background: var(--primary-hover);
    }

    .message {
      margin-top: 15px;
      padding: 10px;
      border-radius: 6px;
      font-size: 0.85rem;
      text-align: center;
    }

    .message.error {
      background: rgba(239, 68, 68, 0.15);
      color: var(--error);
      border: 1px solid rgba(239, 68, 68, 0.3);
    }

    /* 管理ダッシュボード */
    .dashboard-container {
      max-width: 1200px;
      margin: 0 auto;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border);
      padding-bottom: 15px;
      margin-bottom: 25px;
    }

    header h1 {
      font-size: 1.5rem;
      color: var(--primary);
    }

    .user-info {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .btn-secondary {
      background: #e2e8f0;
      color: var(--text);
      border: 1px solid var(--border);
      font-size: 0.8rem;
      padding: 6px 12px;
    }

    .btn-secondary:hover {
      background: #cbd5e1;
    }

    .control-panel {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 25px;
    }

    .control-title {
      font-size: 1.1rem;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .control-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 15px;
    }

    select.btn-select {
      background: #ffffff;
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 10px;
      outline: none;
      cursor: pointer;
    }

    /* 会社サマリーカード */
    .company-cards {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 15px;
      margin-bottom: 25px;
    }

    .company-card {
      border-radius: 12px;
      padding: 20px;
      color: #fff;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .company-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.4);
    }

    /* データテーブル */
    .data-table-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      margin-bottom: 25px;
    }

    .table-header {
      padding: 15px 20px;
      background: rgba(255, 255, 255, 0.03);
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .table-header h3 {
      font-size: 1rem;
      margin: 0;
    }

    .table-container {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
      text-align: left;
    }

    th {
      background: #f1f5f9;
      padding: 12px 15px;
      color: var(--text-muted);
      font-weight: bold;
      border-bottom: 1px solid var(--border);
    }

    td {
      padding: 12px 15px;
      border-bottom: 1px solid var(--border);
    }

    tr:hover {
      background: rgba(0, 0, 0, 0.02);
    }

    .badge-company {
      background: #eff6ff;
      color: #1e40af;
      padding: 3px 8px;
      border-radius: 6px;
      font-size: 0.8rem;
      font-weight: bold;
      font-family: monospace;
    }

    .badge-status {
      padding: 2px 8px;
      border-radius: 20px;
      font-size: 0.8rem;
    }

    .badge-status.approved {
      background: rgba(16, 185, 129, 0.15);
      color: var(--success);
      border: 1px solid rgba(16, 185, 129, 0.3);
    }

    .badge-status.confirmed {
      background: rgba(59, 130, 246, 0.15);
      color: #2563eb;
      border: 1px solid rgba(59, 130, 246, 0.3);
    }

    .badge-status.plan {
      background: rgba(245, 158, 11, 0.15);
      color: var(--warning);
      border: 1px solid rgba(245, 158, 11, 0.3);
    }

    .btn-tab {
      background: #e2e8f0;
      color: var(--text-muted);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 10px 20px;
      cursor: pointer;
      font-weight: bold;
      transition: background 0.2s, color 0.2s;
    }

    .btn-tab:hover {
      background: #cbd5e1;
      color: var(--text);
    }

    .btn-tab.active {
      background: var(--primary) !important;
      color: #fff !important;
      border-color: var(--primary) !important;
    }

    .tab-content {
      display: block;
    }

    .tab-content.hidden {
      display: none !important;
    }

    /* 企業一覧用バッジ */
    .badge-trial {
      background: rgba(239, 68, 68, 0.15);
      color: var(--error);
      border: 1px solid rgba(239, 68, 68, 0.3);
      padding: 2px 8px;
      border-radius: 20px;
      font-size: 0.8rem;
    }

    .badge-active {
      background: rgba(16, 185, 129, 0.15);
      color: var(--success);
      border: 1px solid rgba(16, 185, 129, 0.3);
      padding: 2px 8px;
      border-radius: 20px;
      font-size: 0.8rem;
    }

    /* 詳細ポップアップモーダルスタイル */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: rgba(15, 23, 42, 0.35);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10000;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease;
    }

    .modal-overlay.show {
      opacity: 1;
      pointer-events: auto;
    }

    .modal-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 16px;
      width: 95%;
      max-width: 1000px;
      max-height: 90vh;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
      display: flex;
      flex-direction: column;
      transform: scale(0.95);
      transition: transform 0.25s cubic-bezier(0.16, 1, 0.3, 1);
      overflow: hidden;
    }

    .modal-overlay.show .modal-card {
      transform: scale(1);
    }

    .modal-header {
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(255, 255, 255, 0.01);
    }

    .modal-header h2 {
      font-size: 1.25rem;
      color: var(--primary);
    }

    .btn-close {
      background: none;
      border: none;
      font-size: 2rem;
      color: var(--text-muted);
      cursor: pointer;
      line-height: 1;
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      transition: background 0.2s, color 0.2s, transform 0.2s;
    }

    .btn-close:hover {
      background: rgba(239, 68, 68, 0.1);
      color: var(--error);
      transform: rotate(90deg);
    }

    .modal-body {
      overflow-y: auto;
      display: block;
      height: 60vh;
      padding: 0;
    }

    .modal-tab-content {
      display: block;
    }

    .modal-tab-content.hidden {
      display: none !important;
    }

    .stats-grid-wrapper {
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 24px;
      box-sizing: border-box;
    }

    @media (min-width: 768px) {
      .stats-grid-wrapper {
        display: grid;
        grid-template-columns: 1.3fr 1fr;
        align-items: start;
        gap: 24px;
      }
    }

    /* 無効化された企業の行をグレーアウト */
    tr.company-disabled {
      opacity: 0.55;
      background-color: #f1f5f9 !important;
      color: #94a3b8;
    }
    tr.company-disabled td {
      color: #94a3b8 !important;
    }

    .chart-wrapper {
      background: #ffffff;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      height: 100%;
      min-height: 300px;
      box-sizing: border-box;
    }
    
    .chart-wrapper canvas {
      max-width: 100% !important;
      max-height: 100% !important;
    }
 
    .modal-table-wrapper {
      border: 1px solid var(--border);
      border-radius: 12px;
      background: #ffffff;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      height: 100%;
    }
  </style>
  <!-- Chart.js CDN -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <!-- 1. ログイン画面 -->
  <div id="login-container" class="login-wrapper">
    <div class="login-card">
      <h2>システム管理 ログイン</h2>
      <p>※開発元専用の管理パネルです。</p>
      <form id="login-form">
        <div class="form-group">
          <label for="login-email">メールアドレス</label>
          <input type="email" id="login-email" required class="input-text" placeholder="name@example.com" />
        </div>
        <div class="form-group">
          <label for="login-password">パスワード</label>
          <input type="password" id="login-password" required class="input-text" />
        </div>
        <button type="submit" class="btn btn-primary">管理者ログイン</button>
        <div id="login-error" class="message error hidden"></div>
      </form>
    </div>
  </div>

  <!-- 2. ダッシュボード画面（ログイン後） -->
  <div id="app-container" class="dashboard-container hidden">
    <header>
      <h1>🔧 開発元 システム管理ダッシュボード</h1>
      <div class="user-info">
        <span id="current-user-email" style="font-weight: bold; color: var(--primary);"></span>
        <button id="btn-logout" class="btn btn-secondary">ログアウト</button>
      </div>
    </header>

    <!-- コントロールパネル -->
    <section class="control-panel" style="margin-bottom: 20px;">
      <div class="control-actions" style="margin-top: 0; display: flex; gap: 10px; align-items: center;">
        <button id="admin-reload-btn" class="btn" style="background:#4f46e5; color:#fff;">🔄 本番データ再読み込み</button>
        <select id="admin-company-filter" class="btn-select" style="padding: 10px; font-size: 0.9rem; background: #ffffff; color: var(--text); border: 1px solid var(--border); border-radius: 6px; cursor: pointer;">
          <option value="">🏢 会社を選択して絞り込み...</option>
        </select>
      </div>
    </section>

    <!-- 企業一覧セクション -->
    <div id="companies-section" class="tab-content">
      <!-- 全体サマリーカード -->
      <div class="company-cards" style="grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); margin-bottom: 25px;">
        <div class="company-card" style="background: linear-gradient(135deg, #3b82f6, #1d4ed8); pointer-events: none;">
          <div style="font-size: 1.5rem; margin-bottom: 5px;">🏢</div>
          <div style="font-size: 0.8rem; opacity: 0.8;">登録総企業数</div>
          <div id="summary-total-companies" style="font-size: 2rem; font-weight: bold; margin-top: 5px;">0 社</div>
        </div>
        <div class="company-card" style="background: linear-gradient(135deg, #10b981, #047857); pointer-events: none;">
          <div style="font-size: 1.5rem; margin-bottom: 5px;">👥</div>
          <div style="font-size: 0.8rem; opacity: 0.8;">総登録社員数</div>
          <div id="summary-total-employees" style="font-size: 2rem; font-weight: bold; margin-top: 5px;">0 名</div>
        </div>
        <div class="company-card" style="background: linear-gradient(135deg, #f59e0b, #b45309); pointer-events: none;">
          <div style="font-size: 1.5rem; margin-bottom: 5px;">🏗️</div>
          <div style="font-size: 0.8rem; opacity: 0.8;">総工事登録数</div>
          <div id="summary-total-schedules" style="font-size: 2rem; font-weight: bold; margin-top: 5px;">0 件</div>
        </div>
      </div>

      <!-- 企業別利用状況一覧テーブル -->
      <div class="data-table-card">
        <div class="table-header">
          <h3>企業別 利用状況一覧</h3>
          <span id="admin-companies-count" style="font-size:0.85rem; color:var(--text-muted);">0社</span>
        </div>
        <div class="table-container">
          <table>
            <thead>
              <tr>
                <th>🏢 会社ID / 企業名</th>
                <th>💳 契約プラン / 上限</th>
                <th>💰 支払い方法</th>
                <th>💵 支払い状況</th>
                <th style="text-align:center;">👤 社員数</th>
                <th style="text-align:center;">🏗️ 工事数</th>
                <th>状態 / トライアル期限</th>
                <th>✉️ 管理者メール</th>
                <th>📅 登録日</th>
              </tr>
            </thead>
            <tbody id="admin-companies-tbody">
              <tr>
                <td colspan="9" style="padding:30px; text-align:center; color:var(--text-muted);">
                  「本番データ再読み込み」ボタンを押すと読み込まれます。
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>

  <!-- 3. 会社詳細集計モーダル (ポップアップ別画面) -->
  <div id="company-detail-modal" class="modal-overlay">
    <div class="modal-card">
      <header class="modal-header">
        <h2 id="modal-company-title">🏢 会社詳細</h2>
        <button id="btn-close-modal" class="btn-close">&times;</button>
      </header>
      <!-- モーダル内タブ選択 -->
      <div class="modal-tabs" style="display:flex; border-bottom: 1px solid var(--border); background:rgba(0,0,0,0.02);">
        <button id="modal-tab-config" class="modal-tab-btn active" style="flex:1; padding:12px; border:none; background:none; cursor:pointer; font-weight:bold; border-bottom:2px solid var(--primary); color:var(--primary); font-size: 0.9rem;">⚙️ 企業設定</button>
        <button id="modal-tab-stats" class="modal-tab-btn" style="flex:1; padding:12px; border:none; background:none; cursor:pointer; font-weight:bold; border-bottom:2px solid transparent; color:var(--text-muted); font-size: 0.9rem;">📊 稼働集計</button>
      </div>
      <div class="modal-body">
        <!-- 企業設定タブコンテンツ -->
        <div id="modal-content-config" class="modal-tab-content" style="padding:24px; display:flex; flex-direction:column; gap:20px; box-sizing:border-box;">
          <div style="display:flex; flex-direction:column; gap:20px;">
            <div style="display:grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap:20px;">
              <div>
                <div class="form-group">
                  <label style="font-weight:bold; font-size: 0.85rem; color: var(--text-muted);">会社名</label>
                  <input type="text" id="edit-company-name" class="input-text" style="margin-top:5px; width:100%; border-color:var(--border);" />
                </div>
                <div class="form-group" style="margin-top:15px;">
                  <label style="font-weight:bold; font-size: 0.85rem; color: var(--text-muted);">社員上限数 (名)</label>
                  <input type="number" id="edit-company-max-users" class="input-text" style="margin-top:5px; width:100%; border-color:var(--border);" min="1" />
                </div>
                <div class="form-group" style="margin-top:15px;">
                  <label style="font-weight:bold; font-size: 0.85rem; color: var(--text-muted);">登録日</label>
                  <div id="display-company-created-at" style="margin-top:5px; padding:10px 12px; background:var(--background); border:1px solid var(--border); border-radius:6px; color:var(--text); font-size: 0.9rem;">-</div>
                </div>
              </div>
              
              <!-- 社員一覧 -->
              <div style="display:flex; flex-direction:column;">
                <label style="font-weight:bold; font-size: 0.85rem; color: var(--text-muted); margin-bottom:5px;">社員一覧 (氏名)</label>
                <div id="display-company-employees-list" style="flex:1; padding:10px 12px; background:var(--background); border:1px solid var(--border); border-radius:6px; overflow-y:auto; min-height:180px; max-height:220px; font-size:0.9rem; line-height:1.8; color:var(--text);">
                  <!-- 氏名リスト -->
                </div>
              </div>
            </div>
          </div>

          <!-- 請求書払い管理セクション (JSで表示/非表示切替) -->
          <div id="invoice-payment-section" style="margin-top:10px; padding:15px; background:rgba(79,70,229,0.04); border:1px dashed var(--primary); border-radius:8px; display:none;">
            <h4 style="margin-top:0; margin-bottom:12px; font-size:0.9rem; color:var(--primary); font-weight:bold; display:flex; align-items:center; gap:5px;">
              📄 請求書払い 支払い管理
            </h4>
            <div style="display:grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap:15px; font-size:0.85rem;">
              <div>
                <label style="font-weight:bold; color:var(--text-muted);">支払い状況</label>
                <div id="display-invoice-status" style="margin-top:5px; font-weight:bold; font-size:1rem;">-</div>
              </div>
              <div>
                <label style="font-weight:bold; color:var(--text-muted);">最終支払日</label>
                <div id="display-last-payment-date" style="margin-top:5px; font-size:0.9rem;">-</div>
              </div>
              <div>
                <label style="font-weight:bold; color:var(--text-muted);">次回契約更新日</label>
                <input type="date" id="edit-contract-renewal-date" class="input-text" style="margin-top:5px; width:100%; border-color:var(--border); font-size:0.85rem;" />
              </div>
              <div style="display:flex; align-items:flex-end;">
                <button id="btn-toggle-payment-status" class="btn" style="width:100%; padding:9px; font-size:0.85rem; font-weight:bold; border-radius:6px; cursor:pointer; min-height:38px;">-</button>
              </div>
            </div>
          </div>
          
          <!-- アクション -->
          <div style="display:flex; justify-content:space-between; align-items:center; margin-top:20px; padding-top:15px; border-top:1px solid var(--border); flex-wrap: wrap; gap:10px;">

            <button id="btn-save-company-config" class="btn btn-primary" style="width:auto; padding:10px 30px; border-radius:6px;">💾 設定を保存する</button>
          </div>
        </div>

        <!-- 稼働集計タブコンテンツ -->
        <div id="modal-content-stats" class="modal-tab-content hidden" style="height:100%;">
          <div class="stats-grid-wrapper">
            <!-- グラフエリア -->
            <div class="chart-wrapper">
              <canvas id="company-report-chart"></canvas>
            </div>
            
            <!-- テーブルエリア -->
            <div class="modal-table-wrapper">
              <div class="table-header" style="padding: 12px 15px; background: rgba(0, 0, 0, 0.02); display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border);">
                <h3 style="font-size: 0.95rem;">工事別・月別稼働時間</h3>
                <div>
                  <label for="admin-month-filter" style="font-size: 0.8rem; color: var(--text-muted); margin-right: 5px;">対象月:</label>
                  <select id="admin-month-filter" class="btn-select" style="padding: 4px 8px; font-size: 0.8rem; background: var(--background); border-color: var(--border); color: var(--text); cursor: pointer;">
                    <option value="">すべての月</option>
                  </select>
                </div>
              </div>
              <div class="table-container" style="overflow-y: auto; flex: 1;">
                <table>
                  <thead>
                    <tr style="background: #f1f5f9;">
                      <th style="padding: 10px 15px; font-weight: bold; color: var(--text-muted);">🏗️ 工事名</th>
                      <th style="padding: 10px 15px; font-weight: bold; color: var(--text-muted);">📅 対象月</th>
                      <th style="padding: 10px 15px; text-align: right; width: 100px; font-weight: bold; color: var(--text-muted);">🕒 合計時間</th>
                    </tr>
                  </thead>
                  <tbody id="admin-reports-tbody">
                    <tr>
                      <td colspan="3" style="padding:30px; text-align:center; color:var(--text-muted);">
                        データをロード中...
                      </td>
                    </tr>
                  </tbody>
                </table>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
